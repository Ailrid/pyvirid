version = 1
revision = 3
requires-python = ">=3.10"

[manifest]
members = [
    "core",
    "std",
    "virid",
]

[[package]]
name = "core"
version = "0.1.0"
source = { editable = "packages/core" }

[[package]]
name = "std"
version = "0.1.0"
source = { editable = "packages/std" }
dependencies = [
    { name = "core" },
]

[package.metadata]
requires-dist = [{ name = "core", editable = "packages/core" }]

[[package]]
name = "virid"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "core" },
    { name = "std" },
]

[package.metadata]
requires-dist = [
    { name = "core", editable = "packages/core" },
    { name = "std", editable = "packages/std" },
]
