[project]
name = "virid-std"
version = "0.2.0"
requires-python = ">=3.9"
dependencies = [
    "virid-core",
]

[tool.uv.sources]
virid-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/virid"]
layout = "src"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"